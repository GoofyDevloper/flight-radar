<!DOCTYPE html>
<html>
<head>
  <title>Flight Radar - Aircraft Only ✈️</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; background:#fff; color:#000; text-align:center; font-family: Arial, sans-serif; }
    #map { height:90vh; width:100%; }
    h2 { margin: 10px 0; }
  </style>
</head>
<body>

<h2>Flight Radar - Aircraft Only ✈️</h2>
<div id="map"></div>

<script>
let map, userLat, userLon, planeMarkers = [];

// get user location
navigator.geolocation.getCurrentPosition(pos => {
  userLat = pos.coords.latitude;
  userLon = pos.coords.longitude;

  map = L.map('map').setView([userLat, userLon], 8);

  // Esri World Imagery satellite tile layer (white/light style)
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19,
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
  }).addTo(map);

  loadPlanes();
  setInterval(loadPlanes, 5000);
});

// Load planes and update markers
function loadPlanes(){
  if (!userLat || !userLon) return;

  fetch(`https://api.allorigins.win/raw?url=https://api.adsbexchange.com/v2/lat/${userLat}/lon/${userLon}/dist/50/`)
  .then(response => response.json())
  .then(data => {
    // Remove existing plane markers
    planeMarkers.forEach(marker => map.removeLayer(marker));
    planeMarkers = [];

    data.ac.forEach(p => {
      if (p.lat && p.lon) {
        let marker = L.marker([p.lat, p.lon]).addTo(map)
          .bindPopup(
            `<b>Flight:</b> ${p.flight || "N/A"}<br>` +
            `<b>Altitude:</b> ${p.alt_baro || "N/A"} ft<br>` +
            `<b>Speed:</b> ${p.gs || "N/A"} kts`
          );
        planeMarkers.push(marker);
      }
    });
  })
  .catch(err => console.error("Failed to load plane data", err));
}
</script>

</body>
</html>
